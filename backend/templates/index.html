<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>បញ្ជូលព័ត៍មានព្រះសង្ឃ</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <!-- Google Fonts - Khmer Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Kantumruy+Pro:wght@300;400;500;600;700&family=Siemreap&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="container">
        <h1 id="title">រៀបប្លង់ព្រះសង្ឃ-វត្តនិរោធរង្សី</h1>

        <div id="forms-container">
            <!-- Form 1 -->
            <div class="form-card" id="form-card-1">
                <div class="form-header">
                    <span class="form-number">លេខរៀង #1</span>
                    <button type="button" class="btn-remove" onclick="removeForm(1)" title="លុបទម្រង់">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <form class="monk-form" data-form-index="1">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullname-1">នាមត្រកូល និង នាម <span class="required">*</span></label>
                            <input type="text" id="fullname-1" name="fullname" placeholder="បញ្ចូលនាមព្រះសង្ឃ" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="total-monk-1">ចំនួនវស្សា <span class="required">*</span></label>
                            <input type="number" id="total-monk-1" name="total-monk" min="1" placeholder="បញ្ចូលចំនួន"
                                required>
                        </div>

                    </div>



                    <div class="form-row">
                        <div class="form-group">
                            <label for="type-1">សាមណេរ / ភិក្ខុ <span class="required">*</span></label>
                            <select name="type" id="type-1">
                                <option value="">-- ជ្រើសរើសបួសជា --</option>
                                <option value="សាមណេរ">សាមណេរ</option>
                                <option value="ភិក្ខុ">ភិក្ខុ</option>
                            </select>
                        </div>



                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="home-1">ស្នាក់នៅកុដិ <span class="required">*</span></label>
                            <select name="home" id="home-1">
                                <option value="">-- ជ្រើសរើសកុដិ --</option>
                                <option value="កុដិលេខ១">កុដិលេខ១</option>
                                <option value="កុដិលេខ២_ជាន់ក្រោម">កុដិលេខ២​ ជាន់ក្រោម</option>
                                <option value="កុដិលេខ២_ជាន់លើ">កុដិលេខ២​ ជាន់លើ</option>
                                <option value="កុដិលេខ៤">កុដិលេខ៤</option>
                                <option value="កុដិធំ_ជាន់ទី១">កុដិធំ ជាន់ទី១</option>
                                <option value="កុដិធំ_ជាន់ទី២">កុដិធំ ជាន់ទី២</option>
                                <option value="កុដិធំ_ជាន់ទី៣">កុដិធំ ជាន់ទី៣</option>
                                <option value="កុដិហោត្រៃ">កុដិហោត្រៃ</option>
                                <option value="សាលាបាលីចាស់">កុដិសលាបាលីចាស់</option>
                                <option value="សាលាពុទ្ធិក">សាលាពុទ្ធិក</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="position">តួនាទីក្នុងវត្ត <span class="required">*</span></label>
                            <select name="position" id="position-1">
                                <option value="">-- ជ្រើសរើសតួនាទី --</option>
                                <option value="ព្រះសង្ឃធម្មតា">ព្រះសង្ឃធម្មតា</option>
                                <option value="មេក្រុម">មេក្រុម</option>
                                <option value="អនុមេក្រុម">អនុមេក្រុម</option>
                                <option value="ព្រះគ្រូសូត្រស្តាំ">ព្រះគ្រូសូត្រស្តាំ</option>
                                <option value="ព្រះគ្រូសូត្រឆ្វេង">ព្រះគ្រូសូត្រឆ្វេង</option>
                                <option value="ព្រះគ្រូវិន័យធរ">ព្រះគ្រូវិន័យធរ</option>
                                <option value="ព្រះគ្រូលេខា">ព្រះគ្រូលេខា</option>
                                <option value="ព្រះគ្រូប្រធានការក">ព្រះគ្រូប្រធានការក</option>
                                <option value="ព្រះគ្រូអនុប្រធានការកទី១">ព្រះគ្រូអនុប្រធានការកទី១</option>
                                <option value="ព្រះគ្រូអនុប្រធានការកទី២">ព្រះគ្រូអនុប្រធានការកទី២</option>
                                <option value="មេកុដិ">មេកុដិ</option>
                                <option value="អនុកុដិ">អនុកុដិ</option>
                            </select>
                        </div>

                    </div>

                    <div class="form-row">

                        <div class="form-group">
                            <label for="education_level-1">កម្រិតសិក្សា <span class="required">*</span></label>
                            <select id="education_level-1" name="education_level">
                                <option value="">-- ជ្រើសរើសកម្រិតសិក្សា --</option>
                                <option value="បឋមសិក្សា">បឋមសិក្សា</option>
                                <option value="អនុវិទ្យាល័យ">អនុវិទ្យាល័យ</option>
                                <option value="វិទ្យាល័យ">វិទ្យាល័យ</option>
                                <option value="មហាវិទ្យាល័យ">មហាវិទ្យាល័យ</option>

                            </select>
                        </div>

                        <div class="form-group">
                            <label for="academic_level-1">សិក្សាថ្នាក់ <span class="required">*</span></label>
                            <select name="academic_level" id="academic_level-1">
                                <option value="">-- ជ្រើសរើសតួនាទី --</option>
                                <option value="ឆ្នាំទី១">ឆ្នាំទី ១</option>
                                <option value="ឆ្នាំទី២">ឆ្នាំទី ២</option>
                                <option value="ឆ្នាំទី៣">ឆ្នាំទី ៣</option>
                                <option value="ឆ្នាំទី៤">ឆ្នាំទី ៤</option>
                            </select>
                        </div>
                    </div>

                </form>
            </div>

            <!-- Form 2 -->
            <div class="form-card" id="form-card-2">
                <div class="form-header">
                    <span class="form-number">លេខរៀង #2</span>
                    <button type="button" class="btn-remove" onclick="removeForm(2)" title="លុបទម្រង់">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <form class="monk-form" data-form-index="2">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullname-2">នាមត្រកូល និង នាម <span class="required">*</span></label>
                            <input type="text" id="fullname-2" name="fullname" placeholder="បញ្ចូលនាមព្រះសង្ឃ" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="total-monk-2">ចំនួនវស្សា <span class="required">*</span></label>
                            <input type="number" id="total-monk-2" name="total-monk" min="1" placeholder="បញ្ចូលចំនួន"
                                required>
                        </div>

                    </div>



                    <div class="form-row">
                        <div class="form-group">
                            <label for="type-2">សាមណេរ / ភិក្ខុ <span class="required">*</span></label>
                            <select name="type" id="type-2">
                                <option value="">-- ជ្រើសរើសបួសជា --</option>
                                <option value="សាមណេរ">សាមណេរ</option>
                                <option value="ភិក្ខុ">ភិក្ខុ</option>
                            </select>
                        </div>



                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="home-2">ស្នាក់នៅកុដិ <span class="required">*</span></label>
                            <select name="home" id="home-2">
                                <option value="">-- ជ្រើសរើសកុដិ --</option>
                                <option value="កុដិលេខ១">កុដិលេខ១</option>
                                <option value="កុដិលេខ២_ជាន់ក្រោម">កុដិលេខ២​ ជាន់ក្រោម</option>
                                <option value="កុដិលេខ២_ជាន់លើ">កុដិលេខ២​ ជាន់លើ</option>
                                <option value="កុដិលេខ៤">កុដិលេខ៤</option>
                                <option value="កុដិធំ_ជាន់ទី១">កុដិធំ ជាន់ទី១</option>
                                <option value="កុដិធំ_ជាន់ទី២">កុដិធំ ជាន់ទី២</option>
                                <option value="កុដិធំ_ជាន់ទី៣">កុដិធំ ជាន់ទី៣</option>
                                <option value="កុដិហោត្រៃ">កុដិហោត្រៃ</option>
                                <option value="សាលាបាលីចាស់">កុដិសលាបាលីចាស់</option>
                                <option value="សាលាពុទ្ធិក">សាលាពុទ្ធិក</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="position-2">តួនាទីក្នុងវត្ត <span class="required">*</span></label>
                            <select name="position" id="position-2">
                                <option value="">-- ជ្រើសរើសតួនាទី --</option>
                                <option value="ព្រះសង្ឃធម្មតា">ព្រះសង្ឃធម្មតា</option>
                                <option value="មេក្រុម">មេក្រុម</option>
                                <option value="អនុមេក្រុម">អនុមេក្រុម</option>
                                <option value="ព្រះគ្រូសូត្រស្តាំ">ព្រះគ្រូសូត្រស្តាំ</option>
                                <option value="ព្រះគ្រូសូត្រឆ្វេង">ព្រះគ្រូសូត្រឆ្វេង</option>
                                <option value="ព្រះគ្រូវិន័យធរ">ព្រះគ្រូវិន័យធរ</option>
                                <option value="ព្រះគ្រូលេខា">ព្រះគ្រូលេខា</option>
                                <option value="ព្រះគ្រូប្រធានការក">ព្រះគ្រូប្រធានការក</option>
                                <option value="ព្រះគ្រូអនុប្រធានការកទី១">ព្រះគ្រូអនុប្រធានការកទី១</option>
                                <option value="ព្រះគ្រូអនុប្រធានការកទី២">ព្រះគ្រូអនុប្រធានការកទី២</option>
                                <option value="មេកុដិ">មេកុដិ</option>
                                <option value="អនុកុដិ">អនុកុដិ</option>
                            </select>
                        </div>

                    </div>

                    <div class="form-row">

                        <div class="form-group">
                            <label for="education_level-2">កម្រិតសិក្សា <span class="required">*</span></label>
                            <select id="education_level-2" name="education_level">
                                <option value="">-- ជ្រើសរើសកម្រិតសិក្សា --</option>
                                <option value="បឋមសិក្សា">បឋមសិក្សា</option>
                                <option value="អនុវិទ្យាល័យ">អនុវិទ្យាល័យ</option>
                                <option value="វិទ្យាល័យ">វិទ្យាល័យ</option>
                                <option value="មហាវិទ្យាល័យ">មហាវិទ្យាល័យ</option>

                            </select>
                        </div>

                        <div class="form-group">
                            <label for="academic_level-2">សិក្សាថ្នាក់ <span class="required">*</span></label>
                            <select name="academic_level" id="academic_level-2">
                                <option value="">-- ជ្រើសរើសឆ្នាំសិក្សា --</option>
                                <option value="ឆ្នាំទី១">ឆ្នាំទី ១</option>
                                <option value="ឆ្នាំទី២">ឆ្នាំទី ២</option>
                                <option value="ឆ្នាំទី៣">ឆ្នាំទី ៣</option>
                                <option value="ឆ្នាំទី៤">ឆ្នាំទី ៤</option>
                            </select>
                        </div>
                    </div>

                </form>
            </div>
        </div>


    </div>

    <!-- Action buttons -->
    <div class="action-buttons">
        <button type="button" class="btn-add" onclick="addNewForm()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            បន្ថែមទម្រង់ថ្មី
        </button>
        <button type="button" class="btn-submit" onclick="submitAllForms()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            រក្សាទុកទាំងអស់
        </button>

        <a href="/view" class="btn-view">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            មើលទិន្នន័យ
        </a>
        <button type="button" class="btn-clear" onclick="clearAllForms()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            សម្អាតទាំងអស់
        </button>
    </div>

    <!-- Success message -->
    <div id="success-message" class="success-message" style="display: none;">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <span>ទិន្នន័យត្រូវបានរក្សទុកជោគជ័យ!</span>
    </div>

    <script src="/static/js/script.js"></script>
</body>

</html>
