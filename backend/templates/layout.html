<!DOCTYPE html>
<html lang="km">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ប្លង់អាសនៈ — វត្តនិរោធរង្សី</title>
    <link rel="icon" type="image/jpeg" href="/static/logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Kantumruy+Pro:wght@300;400;500;600;700&family=Siemreap&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/layout.css">
</head>

<body>
    <div class="page-wrapper">

        <!-- Page Header -->
        <div class="page-header no-print">
            <a href="/view" class="btn-back">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                ត្រឡប់ក្រោយ
            </a>
            <img src="/static/logo.jpg" alt="logo" class="header-logo">
            <h1 class="page-title">ប្លង់អាសនៈព្រះសង្ឃ — វត្តនិរោធរង្សី</h1>
            <a href="/report" class="btn-report">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                របាយការណ៍
            </a>
            <button class="btn-submit-att" id="btn-submit-att">
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                បញ្ជូន Telegram
            </button>
            <!-- Export dropdown -->
            <div class="lay-export-dd" id="lay-export-dd">
                <button type="button" class="btn-lay-export-trigger" id="btn-lay-export-trigger">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    នាំចេញ
                    <svg class="lay-chevron" xmlns="http://www.w3.org/2000/svg" width="13" height="13"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <div class="lay-export-menu" id="lay-export-menu">
                    <button class="lay-export-item" id="btn-export-word" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                            stroke="#2b6cb0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                        </svg>
                        Word (.docx)
                    </button>
                    <button class="lay-export-item" id="btn-export-pdf" type="button">
                        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none"
                            stroke="#c53030" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="12" y1="18" x2="12" y2="12"></line>
                            <line x1="9" y1="15" x2="15" y2="15"></line>
                        </svg>
                        PDF
                    </button>
                </div>
            </div>
            <button class="btn-print" onclick="window.print()">
                <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 6 2 18 2 18 9"></polyline>
                    <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                    <rect x="6" y="14" width="12" height="8"></rect>
                </svg>
                បោះពុម្ព
            </button>
            <a href="/logout" class="btn-logout">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                ចាកចេញ
            </a>
        </div>

        <!-- Search bar -->
        <div class="search-bar no-print">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-name" placeholder="ស្វែងរកឈ្មោះ...">
            <button id="btn-clear-search" class="btn-clear-search" style="display:none" title="លុបការស្វែងរក">✕</button>
        </div>

        <!-- Loading state -->
        <div id="loading-state" class="loading-state no-print">
            <div class="spinner"></div>
            <span>កំពុងផ្ទុកទិន្នន័យ...</span>
        </div>

        <div id="layout-content" style="display:none">

            <!-- ====== SECTION 1: BHIKKHU ====== -->
            <div class="section-card">
                <div class="section-header bhikkhu-header">
                    <div class="section-title-row">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        <h2 class="section-title">ផ្នែកទី ១ — ភិក្ខុ</h2>
                        <span class="section-badge bhikkhu-badge">តម្រៀបតាមឋានានុក្រម</span>
                    </div>
                    <div class="controls-bar no-print">
                        <div class="control-group">
                            <label class="ctrl-label">ជួរដេក</label>
                            <input type="number" id="bhikkhu-rows" class="ctrl-input" value="3" min="1" max="30">
                        </div>
                        <span class="ctrl-sep">×</span>
                        <div class="control-group">
                            <label class="ctrl-label">ជួរឈរ</label>
                            <input type="number" id="bhikkhu-cols" class="ctrl-input" value="5" min="1" max="30">
                        </div>
                        <button class="btn-generate" id="btn-gen-bhikkhu">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polyline points="1 4 1 10 7 10"></polyline>
                                <path d="M3.51 15a9 9 0 1 0 .49-4"></path>
                            </svg>
                            បង្កើតប្លង់
                        </button>
                    </div>
                </div>
                <div id="bhikkhu-grid" class="grid-area"></div>
            </div>

            <!-- ====== SECTION 2: SAMANERA ====== -->
            <div class="section-card">
                <div class="section-header samanera-header">
                    <div class="section-title-row">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="8" r="7"></circle>
                            <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline>
                        </svg>
                        <h2 class="section-title">ផ្នែកទី ២ — សាមណេរ</h2>
                        <span class="section-badge samanera-badge">តម្រៀបតាមវស្សា</span>
                    </div>
                    <div class="controls-bar no-print">
                        <div class="control-group">
                            <label class="ctrl-label">ជួរដេក</label>
                            <input type="number" id="samanera-rows" class="ctrl-input" value="12" min="1" max="50">
                        </div>
                        <span class="ctrl-sep">×</span>
                        <div class="control-group">
                            <label class="ctrl-label">ជួរឈរ</label>
                            <input type="number" id="samanera-cols" class="ctrl-input" value="10" min="1" max="30">
                        </div>
                        <button class="btn-generate" id="btn-gen-samanera">
                            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <polyline points="1 4 1 10 7 10"></polyline>
                                <path d="M3.51 15a9 9 0 1 0 .49-4"></path>
                            </svg>
                            បង្កើតប្លង់
                        </button>
                    </div>
                </div>
                <div id="samanera-grid" class="grid-area"></div>
            </div>

        </div>
    </div>

    <!-- Attendance popover -->
    <div id="att-popover" class="att-popover" style="display:none">
        <div class="att-popover-name"></div>
        <div class="att-popover-btns">
            <button class="att-btn att-btn-absent">អវត្តមាន</button>
            <button class="att-btn att-btn-permission">ច្បាប់</button>
            <button class="att-btn att-btn-clear" style="display:none">លុបចោល</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/static/js/layout.js"></script>
</body>

</html>
