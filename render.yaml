services:
  - type: web
    name: pagoda-attendance
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: pagoda-db
          property: host
      - key: DB_NAME
        fromDatabase:
          name: pagoda-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: pagoda-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: pagoda-db
          property: password
      - key: DB_PORT
        fromDatabase:
          name: pagoda-db
          property: port
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: pagoda-db
    databaseName: pagoda_2026
    plan: free
